# HNet Training Configuration
# Override any field via CLI: python train.py --config configs/train/default.yaml --lr 1e-3

# --- Model ---
model_config: configs/sweep_encoder_ratios_flop_matched/hnet_1stage_S_m4.json

# Per-stage LR multipliers (outer to inner). Set to null to disable.
# Example for 2-stage: [3.0, 1.7, 0.9]
lr_multiplier: null

# --- Optimizer ---
lr: 6.25e-4
weight_decay: 0.1
betas: [0.9, 0.95]
max_grad_norm: 1.0

# --- LR Schedule (Warmup-Stable-Decay) ---
warmup_fraction: 0.1   # 10% linear warmup
decay_fraction: 0.2     # 20% inverse-sqrt decay

# --- Loss ---
alpha: 0.03             # Load balancing loss weight
downsample_n: 6       # Expected downsampling factor N

# --- Data ---
data_dir: /scratch-shared/mivanov1/hnet/data  # Local data root (download with download_data.py)
dataset_config: sample-10BT  # Dataset subset name
seq_len: 8192
seed: 42

# --- Batch ---
batch_size: 8            # Micro batch size per GPU
grad_accum_steps: 8      # Gradient accumulation steps
num_workers: 8           # Dataloader workers (can use >0 with local data)

# --- Training ---
max_steps: 10000

# --- Validation ---
validate_every: 100       # Run validation every N steps (0 to disable)
val_fraction: 0.005       # Fraction of streaming documents reserved for validation (0.5%)
val_batches: 50           # Number of micro-batches per validation run

# --- Checkpointing ---
checkpoint_dir: /scratch-shared/mivanov1/hnet/checkpoints/train/sweep_encoder_ratios_flop_matched/train_hnet_1stage_S_m4
save_every: 500
resume: true

# --- Logging ---
log_every: 10
wandb_project: "hnet"      # Set to enable wandb (e.g. "hnet-training")
wandb_run_name: "train_hnet_1stage_S_m4"

# --- Memory ---
activation_checkpointing: false
