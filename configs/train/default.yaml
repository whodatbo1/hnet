# HNet Training Configuration
# Override any field via CLI: python train.py --config configs/train/default.yaml --lr 1e-3

# --- Model ---
model_config: configs/hnet_1stage_S.json

# Per-stage LR multipliers (outer to inner). Set to null to disable.
# Example for 2-stage: [3.0, 1.7, 0.9]
lr_multiplier: null

# --- Optimizer ---
lr: 6.25e-4
weight_decay: 0.1
betas: [0.9, 0.95]
max_grad_norm: 1.0

# --- LR Schedule (Warmup-Stable-Decay) ---
warmup_fraction: 0.1   # 10% linear warmup
decay_fraction: 0.2     # 20% inverse-sqrt decay

# --- Loss ---
alpha: 0.03             # Load balancing loss weight
downsample_n: 2.5       # Expected downsampling factor N

# --- Data ---
dataset: HuggingFaceFW/fineweb-edu
dataset_config: sample-10BT  # HF dataset subset (sample-10BT, sample-100BT, or null for full)
seq_len: 8192
seed: 42
shuffle_buffer: 1000     # Streaming shuffle buffer size (lower = faster startup)

# --- Batch ---
batch_size: 4            # Micro batch size per GPU
grad_accum_steps: 8      # Gradient accumulation steps
num_workers: 0            # 0 recommended for streaming datasets (avoids duplicate load_dataset calls)

# --- Training ---
max_steps: 100000

# --- Checkpointing ---
checkpoint_dir: checkpoints/train
save_every: 1000
resume: false

# --- Logging ---
log_every: 10
wandb_project: "hnet"      # Set to enable wandb (e.g. "hnet-training")

# --- Memory ---
activation_checkpointing: false
